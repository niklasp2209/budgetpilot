spring:
  application:
    name: budgetpilot-backend
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/budgetpilot}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true

auth:
  jwt:
    secret: change-me-change-me-change-me-change-me
    access-ttl-seconds: 900
    refresh-ttl-seconds: 1209600
