name: Build Images

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master

jobs:
  build-docker-images:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build backend image
        run: docker build -f apps/backend/Dockerfile -t budgetpilot-backend:ci .
